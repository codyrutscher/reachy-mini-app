name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-reachy-assist:
    name: Reachy Assist Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reachy-assist

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install openai flask flask-cors numpy

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

  test-dashboard:
    name: Dashboard Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: caregiver-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-cors pytest

      - name: Run dashboard API tests
        run: python -m pytest ../reachy-assist/tests/test_dashboard_api.py -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linter
        run: pip install ruff

      - name: Lint reachy-assist
        run: ruff check reachy-assist/ --select=E,F,W --ignore=E501,F401,E722 --exclude=".venv,__pycache__"

      - name: Lint caregiver-dashboard
        run: ruff check caregiver-dashboard/ --select=E,F,W --ignore=E501,F401,E722 --exclude=".venv,__pycache__"
