<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Reachy Care</title>
<style>
  :root { --bg:#0f1117; --card:#1a1d27; --border:#2a2d3a; --text:#e4e4e7; --muted:#8b8d97; --blue:#3b82f6; --input-bg:#252836; --red:#ef4444; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-box { 
    background:var(--card); border:1px solid var(--border); border-radius:16px; padding:40px; width:380px; text-align:center; animation: fadeIn 0.5s ease;
  }
  .login-box h1 { font-size:24px; margin-bottom:6px; }
  .login-box h1 span { color:var(--blue); }
  .login-box p { font-size:13px; color:var(--muted); margin-bottom:24px; }
  .form-group { margin-bottom:14px; text-align:left; }
  .form-label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
  .form-input { width:100%; background:var(--input-bg); border:1px solid var(--border); color:var(--text); padding:10px 14px; border-radius:8px; font-size:14px; outline:none; }
  .form-input:focus { border-color:var(--blue); }
  .btn { width:100%; padding:10px; background:var(--blue); border:none; color:white; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; margin-top:8px; }
  .btn:hover { opacity:0.9; }
  .error { color:var(--red); font-size:13px; margin-top:10px; display:none; }

  @keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    15% { transform: translateX(-12px); }
    30% { transform: translateX(10px); }
    45% { transform: translateX(-8px); }
    60% { transform: translateX(6px); }
    75% { transform: translateX(-3px); }
    90% { transform: translateX(2px); }
  }
  .shake { animation: shake 0.5s ease; }

</style>
</head>
<body>
<div class="login-box">
  <h1>🤖 <span>Reachy</span> Care</h1>
  <p>Sign in to the caregiver dashboard</p>
  <div class="form-group">
    <label class="form-label">Username</label>
    <input class="form-input" id="username" placeholder="admin" autofocus>
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <div style="position:relative;">
      <input class="form-input" id="password" type="password" placeholder="admin" onkeydown="if(event.key==='Enter')doLogin()" style="padding-right:40px;">
      <button onclick="togglePw()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;" id="eyeBtn" aria-label="Toggle password visibility">👁️</button>
    </div>
  </div>
  <button class="btn" onclick="doLogin()">Sign In</button>
  <div style="margin-top:10px;text-align:left;">
    <label style="font-size:12px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;">
      <input type="checkbox" id="rememberMe"> Remember me
    </label>
  </div>
  <div class="error" id="error">Invalid username or password</div>
</div>
<script>
async function doLogin() {
  var u = document.getElementById('username').value.trim();
  var p = document.getElementById('password').value;
  if (document.getElementById('rememberMe').checked) {
    localStorage.setItem('reachy_username', u);
  } else {
    localStorage.removeItem('reachy_username');
  }
  var res = await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  if (res.ok) { window.location.href='/'; }
  else {
    document.getElementById('error').style.display='block';
    var box = document.querySelector('.login-box');
    box.classList.remove('shake');
    void box.offsetWidth;
    box.classList.add('shake');
  }
}
// Restore saved username on load
(function(){
  var saved = localStorage.getItem('reachy_username');
  if (saved) {
    document.getElementById('username').value = saved;
    document.getElementById('rememberMe').checked = true;
    document.getElementById('password').focus();
  }
})();
function togglePw() {
  var pw = document.getElementById('password');
  var btn = document.getElementById('eyeBtn');
  if (pw.type === 'password') {
    pw.type = 'text';
    btn.textContent = '🙈';
  } else {
    pw.type = 'password';
    btn.textContent = '👁️';
  }
}
</script>
</body>
</html>
